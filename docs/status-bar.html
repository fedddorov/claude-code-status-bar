<!doctype html><html><head><meta charset="utf-8"><style>
  body{margin:0;background:#161616;display:flex;justify-content:center;padding:34px}
  .term{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:10px;width:760px;
        box-shadow:0 10px 40px rgba(0,0,0,.5);overflow:hidden;font-family:"SF Mono",
        "JetBrains Mono",Menlo,Consolas,monospace}
  .tb{height:34px;background:#242424;display:flex;align-items:center;padding:0 14px;gap:8px}
  .tb i{width:12px;height:12px;border-radius:50%;display:inline-block}
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .tb span{color:#777;font-size:12px;margin-left:10px}
  .rows{padding:18px 22px 22px}
  .cap{color:#666;font-size:12px;margin:14px 0 4px}
  .cap:first-child{margin-top:0}
  .line{color:#d8d8d8;font-size:15px;text-align:left;white-space:pre;letter-spacing:.3px}
  .dim{color:#8c8c8c}.b{color:#ffffff;font-weight:600}
</style></head><body>
  <div class="term">
    <div class="tb"><i class="r"></i><i class="y"></i><i class="g"></i><span>claude-code</span></div>
    <div class="rows">
      <div class="cap">Fresh session · low effort · light load</div>
      <div class="line"><span style="color:#87af87">●</span> <span style="color:#87af87">low</span><span class="dim"> │ </span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span> <span style="color:#87af87">2%</span>  <span class="b">12k</span><span class="dim">/600k</span><span class="dim"> │ </span><span class="dim">5h</span> <span style="color:#87af87">4%</span><span class="dim"> │ </span><span class="dim">7d</span> <span style="color:#87af87">9%</span></div>
      <div class="cap">Mid-session · medium effort · warming up</div>
      <div class="line"><span style="color:#d7af5f">●</span> <span style="color:#d7af5f">medium</span><span class="dim"> │ </span><span style="color:#d7af5f">█</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span> <span style="color:#d7af5f">12%</span>  <span class="b">74k</span><span class="dim">/617k</span><span class="dim"> │ </span><span class="dim">5h</span> <span style="color:#d7af5f">58%</span><span class="dim"> │ </span><span class="dim">7d</span> <span style="color:#87af87">31%</span></div>
      <div class="cap">Heavy session · high effort · limits getting tight</div>
      <div class="line"><span style="color:#d75f5f">●</span> <span style="color:#d75f5f">high</span><span class="dim"> │ </span><span style="color:#d75f5f">█</span><span style="color:#d75f5f">█</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span><span class="dim">░</span> <span style="color:#d75f5f">22%</span>  <span class="b">220k</span><span class="dim">/1.0M</span><span class="dim"> │ </span><span class="dim">5h</span> <span style="color:#d75f5f">93%</span><span class="dim"> │ </span><span class="dim">7d</span> <span style="color:#d7875f">82%</span></div>
    </div>
  </div>
</body></html>
